name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt pyinstaller

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $candidates = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          )
          foreach ($candidate in $candidates) {
            if (Test-Path $candidate) {
              "INNO_SETUP_COMPILER=$candidate" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              exit 0
            }
          }
          throw "ISCC.exe tidak ditemukan setelah install Inno Setup."

      - name: Build app and installer
        run: python build_windows.py

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: RekonOnlineFoodSetup-1.01
          path: dist/installer/RekonOnlineFoodSetup-1.01.exe
          if-no-files-found: error

      - name: Upload portable app artifact
        uses: actions/upload-artifact@v4
        with:
          name: RekonOnlineFood-1.01-portable
          path: dist/RekonOnlineFood-1.01
          if-no-files-found: error
